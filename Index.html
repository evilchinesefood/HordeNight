<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HordeNight</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0a0d12;
        font-family: system-ui, sans-serif;
      }
      canvas {
        display: block;
      }
      #Overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: rgba(8, 10, 14, 0.72);
        color: #e8e4d8;
        cursor: pointer;
        user-select: none;
        z-index: 10;
        text-align: center;
      }
      #Overlay h1 {
        margin: 0;
        font-size: 44px;
        letter-spacing: 6px;
        font-weight: 700;
        text-shadow: 0 2px 18px rgba(255, 160, 60, 0.35);
      }
      #Overlay p {
        margin: 0;
        opacity: 0.85;
        line-height: 1.7;
      }
      #Overlay .Hint {
        font-size: 13px;
        opacity: 0.55;
      }
      #Overlay.Hidden {
        display: none;
      }
      #Hud {
        position: fixed;
        left: 50%;
        bottom: 26px;
        transform: translateX(-50%);
        z-index: 5;
        pointer-events: none;
      }
      #HealthBar {
        width: 240px;
        height: 13px;
        background: rgba(10, 12, 16, 0.55);
        border: 1px solid rgba(232, 228, 216, 0.35);
        border-radius: 3px;
        overflow: hidden;
      }
      #HealthFill {
        height: 100%;
        width: 100%;
        background: linear-gradient(#c4503e, #8f2f22);
        transition: width 0.15s ease;
      }
      #DamageFlash {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 8;
        opacity: 0;
        background: radial-gradient(
          ellipse at center,
          rgba(150, 8, 8, 0) 55%,
          rgba(150, 8, 8, 0.6) 100%
        );
      }
      #DamageFlash.Death {
        background: rgba(110, 0, 0, 0.92);
      }
    </style>
  </head>
  <body>
    <div id="Overlay">
      <h1>HORDENIGHT</h1>
      <p>
        <b>WASD</b> move &nbsp;·&nbsp; <b>Mouse</b> look &nbsp;·&nbsp;
        <b>Shift</b> sprint &nbsp;·&nbsp; <b>Space</b> jump
      </p>
      <p class="Hint">Loading&hellip;</p>
    </div>
    <div id="Hud">
      <div id="HealthBar"><div id="HealthFill"></div></div>
    </div>
    <div id="DamageFlash"></div>
    <script>
      // module-load failure fallback; Main.js owns the hint once it boots
      window.addEventListener("error", function () {
        var h = document.querySelector("#Overlay .Hint");
        if (h && h.textContent.indexOf("Loading") === 0)
          h.textContent = "Failed to load - check your connection and refresh.";
      });
    </script>
    <script type="module" src="/Source/Main.js"></script>
  </body>
</html>
